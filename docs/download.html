<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Decoda Scanner Bridge</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a0a;
      color: #e0e0e0;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 0.95rem; color: #888; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: #4f6df5;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover { background: #3b57d9; }
    .alt-link {
      display: block;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #666;
    }
    .alt-link a { color: #888; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Download Decoda Scanner Bridge</h1>
    <p id="status">Detecting your operating system...</p>
    <a id="download-btn" class="btn" style="display:none">Download</a>
    <div id="alt" class="alt-link" style="display:none"></div>
  </div>
  <script>
    const REPO = 'decoda-health/scanner-bridge';
    const API = 'https://api.github.com/repos/' + REPO + '/releases/latest';
    const RELEASES_PAGE = 'https://github.com/' + REPO + '/releases/latest';

    const btn = document.getElementById('download-btn');
    const status = document.getElementById('status');
    const alt = document.getElementById('alt');

    function classify(name) {
      if (name.endsWith('.dmg') && name.includes('aarch64')) return 'macArm';
      if (name.endsWith('.dmg') && name.includes('x86_64')) return 'macIntel';
      if (name.endsWith('.msi')) return 'windows';
      return null;
    }

    fetch(API)
      .then(r => r.json())
      .then(release => {
        const assets = {};
        for (const a of release.assets) {
          const key = classify(a.name);
          if (key) assets[key] = a.browser_download_url;
        }

        const ua = navigator.userAgent;
        let primary, primaryLabel, altLinks = [];

        if (ua.includes('Mac')) {
          primary = assets.macArm;
          primaryLabel = 'Download for macOS (Apple Silicon)';
          if (assets.macIntel) altLinks.push({ href: assets.macIntel, label: 'macOS (Intel)' });
          if (assets.windows) altLinks.push({ href: assets.windows, label: 'Windows' });
        } else if (ua.includes('Win')) {
          primary = assets.windows;
          primaryLabel = 'Download for Windows';
          if (assets.macArm) altLinks.push({ href: assets.macArm, label: 'macOS (Apple Silicon)' });
          if (assets.macIntel) altLinks.push({ href: assets.macIntel, label: 'macOS (Intel)' });
        } else {
          status.textContent = 'Decoda Scanner Bridge is available for macOS and Windows.';
          if (assets.macArm) altLinks.push({ href: assets.macArm, label: 'macOS (Apple Silicon)' });
          if (assets.macIntel) altLinks.push({ href: assets.macIntel, label: 'macOS (Intel)' });
          if (assets.windows) altLinks.push({ href: assets.windows, label: 'Windows' });
        }

        if (primary) {
          status.textContent = '';
          btn.href = primary;
          btn.textContent = primaryLabel;
          btn.style.display = 'inline-block';
        }

        if (altLinks.length) {
          alt.style.display = 'block';
          alt.innerHTML = 'Also available for ' +
            altLinks.map(l => '<a href="' + l.href + '">' + l.label + '</a>').join(', ');
        }
      })
      .catch(() => {
        status.innerHTML = 'Could not fetch the latest release. <a href="' + RELEASES_PAGE + '" style="color:#4f6df5">Download from GitHub</a>';
      });
  </script>
</body>
</html>
